<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | EMAGE GALAXY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="assets/css/variables.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <link href="assets/css/pages.css" rel="stylesheet">
  <link href="assets/css/theme.css" rel="stylesheet">
  <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
  <div class="dynamic-bg"></div>
  <div id="navbar-placeholder"></div>

  <main class="page-content auth-page">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p class="auth-subtitle">Demo password recovery flow</p>

      <!-- Step 1: Email -->
      <div class="auth-steps active" id="stepEmail">
        <form id="emailForm">
          <div class="form-group">
            <label class="form-label-galaxy" for="forgotEmail">Email Address</label>
            <input type="email" class="form-glass" id="forgotEmail" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn-galaxy w-100"><i class="fas fa-envelope"></i> Send OTP</button>
        </form>
      </div>

      <!-- Step 2: OTP -->
      <div class="auth-steps" id="stepOTP">
        <p style="color:var(--text-secondary);text-align:center;margin-bottom:1rem;">Enter the 6-digit OTP sent to your email</p>
        <form id="otpForm">
          <div class="otp-inputs">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
            <input type="text" class="otp-input form-glass" maxlength="1" pattern="[0-9]">
          </div>
          <p style="text-align:center;color:var(--text-muted);font-size:0.8rem;">Demo OTP: 123456</p>
          <button type="submit" class="btn-galaxy w-100"><i class="fas fa-check"></i> Verify OTP</button>
        </form>
      </div>

      <!-- Step 3: Reset -->
      <div class="auth-steps" id="stepReset">
        <form id="resetForm">
          <div class="form-group">
            <label class="form-label-galaxy" for="newPassword">New Password</label>
            <input type="password" class="form-glass" id="newPassword" placeholder="New password" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label-galaxy" for="confirmPassword">Confirm Password</label>
            <input type="password" class="form-glass" id="confirmPassword" placeholder="Confirm password" required>
          </div>
          <button type="submit" class="btn-galaxy w-100"><i class="fas fa-key"></i> Reset Password</button>
        </form>
      </div>

      <p class="text-center mt-4"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/wallpapers-data.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/access.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/wallpapers.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
